<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo de Prode — Fixture Mundial 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 440px; margin: 24px; padding: 32px; background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
        .icon { font-size: 56px; margin-bottom: 12px; }
        h1 { font-size: 20px; margin-bottom: 6px; color: #1B5E20; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 20px; }
        .name { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #333; background: #f0f7f0; padding: 10px 16px; border-radius: 10px; display: inline-block; }
        .msg { font-size: 15px; color: #555; margin-bottom: 24px; line-height: 1.5; }
        .btn { display: inline-block; background: #1B5E20; color: white; text-decoration: none; padding: 14px 28px; border-radius: 12px; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .btn:hover { background: #2E7D32; }
        .btn-secondary { display: inline-block; background: #e8f5e9; color: #1B5E20; text-decoration: none; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; }
        .btn-secondary:hover { background: #c8e6c9; }
        .small { font-size: 12px; color: #aaa; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#9917;</div>
        <h1>Fixture Mundial 2026</h1>
        <p class="subtitle">Grupo de Prode</p>

        <div id="group-box" class="name" style="display:none;"></div>

        <p class="msg" id="msg-loading">
            Abriendo la app...
        </p>

        <div id="fallback" style="display:none;">
            <p class="msg">
                Toc&aacute; el bot&oacute;n para unirte al grupo:
            </p>
            <a id="open-app-btn" class="btn" href="#">
                Abrir en Fixture 2026
            </a>
            <br><br>
            <a id="store-link" class="btn-secondary" href="https://play.google.com/store/apps/details?id=com.egeainc.fixture2026">
                Descargar desde Google Play
            </a>
        </div>

        <p class="small">Developed by Gabriel Egea</p>
    </div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var groupId = params.get('id');
            var groupName = params.get('name');
            if (!groupId) {
                document.getElementById('msg-loading').textContent = 'Link inv\u00e1lido.';
                return;
            }

            if (groupName) {
                var box = document.getElementById('group-box');
                box.textContent = decodeURIComponent(groupName);
                box.style.display = 'inline-block';
            }

            // Build the Android Intent URI - this works from WhatsApp's in-app browser
            var intentUri = 'intent://group?id=' + encodeURIComponent(groupId);
            if (groupName) intentUri += '&name=' + encodeURIComponent(groupName);
            intentUri += '#Intent;scheme=fixture2026;package=com.egeainc.fixture2026;end;';

            // Also build custom scheme as fallback for non-Android
            var customScheme = 'fixture2026://group?id=' + encodeURIComponent(groupId);
            if (groupName) customScheme += '&name=' + encodeURIComponent(groupName);

            // Set the button href to the intent URI
            document.getElementById('open-app-btn').href = intentUri;

            // Try to open automatically via intent URI
            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = intentUri;
            document.body.appendChild(iframe);

            // Also try custom scheme redirect
            window.location.href = customScheme;

            // Show fallback button after a short delay
            setTimeout(function() {
                document.getElementById('msg-loading').style.display = 'none';
                document.getElementById('fallback').style.display = 'block';
            }, 1500);
        })();
    </script>
</body>
</html>
