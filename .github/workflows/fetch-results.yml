name: Fetch World Cup Results

on:
  # schedule deshabilitado 2026-06-23: el droplet (161.35.113.228, fetch_live.py
  # con API-Sports) es la unica fuente de verdad. Corria cada 15min y trataba de
  # git push results.json -> 403 (token de Actions sin permiso de escritura) ->
  # fallaba y mandaba emails de fallo. Si "funcionara" haria doble-push con data
  # mas pobre y chocaria con el droplet. Queda solo manual (workflow_dispatch).
  # schedule:
  #   - cron: "*/15 12-23 * 6-7 *"
  #   - cron: "*/15 0-4 * 6-7 *"
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch results from API
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python3 fetch_results.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            COUNT=$(python3 -c "import json; print(len(json.load(open('results.json'))['results']))")
            git commit -m "Auto-update results ($COUNT matches)"
            git push
          fi
