name: Fetch World Cup Results

on:
  schedule:
    # 3 veces al día durante el mundial (11 jun - 19 jul 2026)
    # 10:00 UTC (mañana), 18:00 UTC (tarde), 02:00 UTC (noche/madrugada)
    - cron: "0 10 * 6-7 *"
    - cron: "0 18 * 6-7 *"
    - cron: "0 2 * 6-7 *"
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Solo correr durante el mundial: 11 jun - 19 jul 2026
    # (los crons ya filtran por mes, esto es extra seguridad)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch results from API
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python3 fetch_results.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            COUNT=$(python3 -c "import json; print(len(json.load(open('results.json'))['results']))")
            git commit -m "Auto-update results ($COUNT matches)"
            git push
          fi
