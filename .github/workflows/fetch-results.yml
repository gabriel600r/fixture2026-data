name: Fetch World Cup Results

on:
  schedule:
    # Cada 15 minutos durante junio y julio (mundial: 11 jun - 19 jul 2026)
    # Los partidos se juegan entre 13:00 UTC y 03:00 UTC del día siguiente
    # Corremos de 12:00 a 04:00 UTC para cubrir todos los horarios
    - cron: "*/15 12-23 * 6-7 *"
    - cron: "*/15 0-4 * 6-7 *"
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch results from API
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python3 fetch_results.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            COUNT=$(python3 -c "import json; print(len(json.load(open('results.json'))['results']))")
            git commit -m "Auto-update results ($COUNT matches)"
            git push
          fi
