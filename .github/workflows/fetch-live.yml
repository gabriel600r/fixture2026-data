name: Fetch Live Matches

on:
  schedule:
    # Every 2 minutes during match hours (UTC)
    # World Cup 2026: 11 jun - 19 jul
    # Matches: 13:00–03:00 UTC (covers all timezones)
    - cron: "*/2 12-23 * 6-7 *"
    - cron: "*/2 0-4 * 6-7 *"
    # Testing: ARG vs ZAM friendly 31 mar 2026 (23:15 ART = 02:15 UTC 1 apr)
    - cron: "*/2 1-5 1 4 *"
    - cron: "*/2 22-23 31 3 *"
  workflow_dispatch: # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live match data
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 fetch_live.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Live update $(date -u +%H:%M)"
            git push
          fi
