name: Fetch Live Matches

on:
  # schedule deshabilitado 2026-06-01: el droplet NYC1 es la fuente de verdad
  # (fetch_live.py con football-data.org primary + fallbacks, auto-gateado por
  # schedule.json). Este workflow corria el fetch_live.py viejo del repo
  # (LiveScore6/RapidAPI, cuota agotada) sin GITHUB_TOKEN -> fallaba siempre, y
  # el cron mes=6-7 dia=* disparaba cada 2 min todo junio/julio (sin gate al
  # dia 11 ni por partido). Si "funcionara" haria doble-push sobre results.json
  # y chocaria con el droplet. Queda solo manual.
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live match data
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 fetch_live.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Live update $(date -u +%H:%M)"
            git push
          fi
